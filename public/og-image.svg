<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0C2340"/>
  <!-- Subtle border accent -->
  <rect x="40" y="40" width="1120" height="550" rx="8" fill="none" stroke="#457B9D" stroke-width="1" opacity="0.4"/>
  <!-- Top accent line -->
  <rect x="500" y="200" width="200" height="2" fill="#D4A373" opacity="0.6"/>
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Playfair Display', serif" font-size="48" font-weight="700" letter-spacing="0.06em">THE SPARKFOLIO</text>
  <text x="600" y="340" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Playfair Display', serif" font-size="48" font-weight="700" letter-spacing="0.06em">INVESTMENT FRAMEWORK</text>
  <!-- Bottom accent line -->
